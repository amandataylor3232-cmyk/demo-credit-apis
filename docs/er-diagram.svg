<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 420" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#334155"/>
    </marker>
  </defs>
  <rect width="920" height="420" fill="#f8fafc"/>
  <text x="460" y="32" text-anchor="middle" font-size="18" font-weight="600" fill="#0f172a">Demo Credit Wallet  E-R Diagram</text>

  <!-- users -->
  <rect x="40" y="70" width="240" height="200" rx="6" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <rect x="40" y="70" width="240" height="32" rx="6" fill="#2563eb"/>
  <text x="160" y="92" text-anchor="middle" fill="#ffffff" font-weight="600">users</text>
  <text x="52" y="118" font-size="12" fill="#334155"><tspan font-weight="600">PK</tspan> id</text>
  <text x="52" y="138" font-size="12" fill="#334155">name, email (UK)</text>
  <text x="52" y="158" font-size="12" fill="#334155">phone, bvn</text>
  <text x="52" y="178" font-size="12" fill="#334155">access_token (UK)</text>
  <text x="52" y="198" font-size="12" fill="#64748b">created_at, updated_at</text>

  <!-- wallets -->
  <rect x="340" y="70" width="240" height="180" rx="6" fill="#ffffff" stroke="#059669" stroke-width="2"/>
  <rect x="340" y="70" width="240" height="32" rx="6" fill="#059669"/>
  <text x="460" y="92" text-anchor="middle" fill="#ffffff" font-weight="600">wallets</text>
  <text x="352" y="118" font-size="12" fill="#334155"><tspan font-weight="600">PK</tspan> id</text>
  <text x="352" y="138" font-size="12" fill="#334155"><tspan font-weight="600">FK</tspan> user_id (UK)</text>
  <text x="352" y="158" font-size="12" fill="#334155">balance</text>
  <text x="352" y="178" font-size="12" fill="#64748b">created_at, updated_at</text>

  <!-- transactions -->
  <rect x="640" y="70" width="260" height="220" rx="6" fill="#ffffff" stroke="#d97706" stroke-width="2"/>
  <rect x="640" y="70" width="260" height="32" rx="6" fill="#d97706"/>
  <text x="770" y="92" text-anchor="middle" fill="#ffffff" font-weight="600">transactions</text>
  <text x="652" y="118" font-size="12" fill="#334155"><tspan font-weight="600">PK</tspan> id</text>
  <text x="652" y="138" font-size="12" fill="#334155"><tspan font-weight="600">FK</tspan> wallet_id</text>
  <text x="652" y="158" font-size="12" fill="#334155">type, amount</text>
  <text x="652" y="178" font-size="12" fill="#334155">reference (nullable)</text>
  <text x="652" y="198" font-size="12" fill="#334155"><tspan font-weight="600">FK</tspan> counterparty_wallet_id</text>
  <text x="652" y="218" font-size="12" fill="#64748b">created_at, updated_at</text>

  <!-- relationships -->
  <line x1="280" y1="150" x2="340" y2="150" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="310" y="140" text-anchor="middle" font-size="11" fill="#475569">1 : 1</text>

  <line x1="580" y1="150" x2="640" y2="150" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="610" y="140" text-anchor="middle" font-size="11" fill="#475569">1 : N</text>

  <path d="M 460 250 C 460 310, 770 310, 770 290" fill="none" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrow)"/>
  <text x="615" y="328" text-anchor="middle" font-size="11" fill="#64748b">transfer peer (self-ref)</text>

  <text x="460" y="390" text-anchor="middle" font-size="12" fill="#64748b">Designed for MySQL 8 · Import SQL at https://app.dbdesigner.net/</text>
</svg>
